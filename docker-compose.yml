version: '3.8'

services:
  # MongoDB database service
  mongo:
    image: mongo:6.0
    container_name: sbstocks_db
    ports:
      - "27017:27017"
    volumes:
      - sbstocks_db_data:/data/db
    networks:
      - sbstocks-network

  # Express REST API service
  backend:
    build: ./backend
    container_name: sbstocks_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/sb-stocks
      - JWT_SECRET=sbstockssecretkey12345!
      - JWT_EXPIRE=30d
      - NODE_ENV=development
      - FINNHUB_API_KEY= # Paste key here if using Finnhub live
    depends_on:
      - mongo
    networks:
      - sbstocks-network

  # Vite + React Client service
  frontend:
    build: ./frontend
    container_name: sbstocks_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - sbstocks-network

volumes:
  sbstocks_db_data:

networks:
  sbstocks-network:
    driver: bridge
